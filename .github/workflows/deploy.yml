name: deploy-book
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      group: LargerInstance

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: main
          fetch-tags: true

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Make repo safe for git
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Install Python build headers
        run: |
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y g++
          else
            apt-get update
            apt-get install -y g++
          fi

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build backend tools
        run: python3 -m pip install setuptools wheel Cython numpy==2.4.6

      - name: Install your package
        run: python3 -m pip install --no-build-isolation -e .

      - name: Install build requirements
        run: |
          python3 -m pip install -r requirements-ci.txt
          python3 -m pip install markupsafe==3.0.3
          python3 -m pip install -U mystmd

      - name: Install docs JS dependencies
        run: npm install --prefix ./docs

      - name: Build MyST Book
        working-directory: ./docs
        env:
          HOST: "127.0.0.1"
          BASE_URL: /${{ github.event.repository.name }}
        run: |
          myst clean --all
          myst build --html

      - name: Verify built site exists
        run: |
          ls -la ./docs/_build
          test -d ./docs/_build/html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3.6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html
          publish_branch: gh-pages
          force_orphan: false
