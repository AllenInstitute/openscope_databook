name: deploy-book
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      group: LargerInstance
    container:
      image: rcpeene/openscope_databook:latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: main
          fetch-tags: true

      - name: Make repo safe for git
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Install Python build headers
        run: |
          apt-get update
          apt-get install -y python3-dev g++

      - name: Install Node.js 20
        run: |
          apt-get install -y curl
          curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
          apt-get install -y nodejs

      - name: Install build backend tools
        run: python3 -m pip install setuptools wheel Cython numpy==2.4.6

      - name: Install your package
        run: python3 -m pip install --no-build-isolation -e .

      - name: Install build requirements
        run: |
          python3 -m pip install -r requirements-ci.txt
          python3 -m pip install markupsafe==3.0.3
          python3 -m pip install -U mystmd

      - name: Install docs JS dependencies
        run: npm install --prefix ./docs

      - name: Build MyST Book
        working-directory: ./docs
        env:
          HOST: "127.0.0.1"
          BASE_URL: /${{ github.event.repository.name }}
        run: |
          myst clean --all
          myst build --html

      - name: Verify built site exists
        run: |
          ls -la ./docs/_build
          test -d ./docs/_build/html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3.6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html
          publish_branch: gh-pages
          force_orphan: false
