name: deploy-book
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on:
      group: LargerInstance
    container:
      image: rcpeene/openscope_databook:latest

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: main
          fetch-tags: true

      - name: Make repo safe for git
        run: git config --global --add safe.directory $GITHUB_WORKSPACE

      - name: Install Python build headers
        run: |
          apt-get update
          apt-get install -y python3-dev g++

      - name: Install build backend tools
        run: python3 -m pip install setuptools wheel Cython numpy==1.26.0

      - name: Install your package
        run: python3 -m pip install --no-build-isolation -e .

      - name: Install build requirements
        run: |
          python3 -m pip install -r requirements-ci.txt
          python3 -m pip install markupsafe==2.0.1
          python3 -m pip install -U jupyter-book

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build Jupyter Book
        run: |
          jupyter-book clean ./docs
          jupyter-book build ./docs

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3.6.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/_build/html
