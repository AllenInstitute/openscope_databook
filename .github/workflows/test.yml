name: test
on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

  workflow_dispatch:

jobs:
  test:
    runs-on: 
      group: LargerInstance

    env:
      DANDI_API_KEY: ${{ secrets.DANDI_API_KEY }}
      TESTING: True

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install system build tools
        run: |
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y g++
          else
            apt-get update
            apt-get install -y g++

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Sync environment from lockfile
        run: |
          uv sync --frozen --extra dev --python 3.10

      - name: Printing environment
        run: uv pip freeze
      
      - name: Getting changed files
        id: changed_files
        uses: Ana06/get-changed-files@v2.2.0
        with:
          filter: "*.ipynb"
        
      - name: Testing notebooks
        if: ${{ steps.changed_files.outputs.added_modified  != '' }}
        run: uv run pytest --nbmake --nbmake-timeout=5000 -n=2 ${{ steps.changed_files.outputs.added_modified }}

