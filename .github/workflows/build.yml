
name: build
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" , "dev"]

  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on:
      group: LargerInstance

    env:
      DANDI_API_KEY: ${{ secrets.DANDI_API_KEY }}
      TESTING: True

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up swap space
        run: |
          sudo fallocate -l 10G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python build headers
        run: |
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y g++
          else
            apt-get update
            apt-get install -y g++
          fi

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Sync environment from lockfile
        run: |
          uv sync --frozen --extra dev --python 3.10

      - name: Printing environment
        run: uv pip freeze

      - name: Debug Higher-Order import path
        run: |
          echo "Python executable:"
          uv run python -c "import sys; print(sys.executable)"
          echo "Repository root and import resolution:"
          uv run python - <<'PY'
          import os
          import sys
          import traceback
          import importlib.util

          print("cwd:", os.getcwd())
          print("sys.path[0:8]:")
          for p in sys.path[:8]:
            print("  ", p)

          spec_pkg = importlib.util.find_spec("databook_utils")
          spec_mod = importlib.util.find_spec("databook_utils.dandi_utils")
          spec_zarr = importlib.util.find_spec("hdmf_zarr")
          print("spec databook_utils:", spec_pkg)
          print("spec databook_utils.dandi_utils:", spec_mod)
          print("spec hdmf_zarr:", spec_zarr)

          try:
            from databook_utils.dandi_utils import dandi_download_open
            print("IMPORT_OK dandi_download_open:", callable(dandi_download_open))
          except Exception as exc:
            print("IMPORT_FAILED:", repr(exc))
            traceback.print_exc()
            raise
          PY

      - name: Debug Higher-Order notebook setup cells
        run: |
          uv run python - <<'PY'
          import json
          from pathlib import Path

          files = [
            Path("docs/higher-order/behavioral_state.ipynb"),
            Path("docs/higher-order/cebra_time.ipynb"),
            Path("docs/higher-order/glm.ipynb"),
            Path("docs/higher-order/tca.ipynb"),
          ]

          for f in files:
            nb = json.loads(f.read_text(encoding="utf-8"))
            print(f"===== {f} =====")
            found = False
            for i, cell in enumerate(nb.get("cells", []), start=1):
              if cell.get("cell_type") != "code":
                continue
              src = "".join(cell.get("source", []))
              if "dandi_download_open" in src or "databook_utils.dandi_utils" in src:
                print(f"cell {i}:")
                print(src)
                found = True
                break
            if not found:
              print("setup cell not found")
          PY

      - name: Testing Higher-Order Notebooks
        run: |
          uv run pytest --nbmake --nbmake-timeout=8000 -n=auto "./docs/higher-order"
          rm ./docs/higher-order/*.nwb

      - name: Testing Basics Notebooks
        run: |
          uv run pytest --nbmake --nbmake-timeout=100000 -n=auto "./docs/basics"
          rm ./docs/basics/*.nwb

      - name: Testing Visualization Notebooks
        run: |
          uv run pytest --nbmake --nbmake-timeout=8000 -n=auto "./docs/visualization"
          rm ./docs/visualization/*.nwb

      - name: Testing First-Order Notebooks
        run: |
          uv run pytest --nbmake --nbmake-timeout=8000 -n=auto "./docs/first-order"
          rm ./docs/first-order/*.nwb
        
      - name: Testing Project Notebooks
        run: |
          for nb in ./docs/projects/*.ipynb; do
            echo "::group::Testing $nb"
            uv run pytest --nbmake --nbmake-timeout=12000 -v --tb=long "$nb"
            rm -f ./docs/projects/*.nwb
            echo "::endgroup::"
          done
        
      - name: Printing log
        run: |
          git config --global --add safe.directory /__w/openscope_databook/openscope_databook
          git status
      
      - name: Printing shortlog
        run: git log | git shortlog -sn  

      - name: Install docs JS dependencies
        run: npm install --prefix ./docs

      - name: Build MyST book
        working-directory: ./docs
        run: |
          uv run myst clean --all
          uv run myst build --html
