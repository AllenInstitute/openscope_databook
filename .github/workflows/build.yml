
name: build
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" , "dev"]

  workflow_dispatch:

jobs:
  build:
    runs-on:
      group: LargerInstance

    env:
      DANDI_API_KEY: ${{ secrets.DANDI_API_KEY }}
      TESTING: True

    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python build headers
        run: |
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y g++
          else
            apt-get update
            apt-get install -y g++
          fi

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Sync environment from lockfile
        run: |
          uv sync --frozen --extra dev --python 3.10

      - name: Printing environment
        run: uv pip freeze

      - name: Testing Embargoed Notebooks
        run: |
          uv run pytest --nbmake --nbmake-timeout=8000 -n=auto "./docs/embargoed"
          rm ./docs/embargoed/*.nwb

      - name: Testing Higher-Order Notebooks
        run: |
          uv run pytest --nbmake --nbmake-timeout=8000 -n=auto "./docs/higher-order" --ignore docs/higher-order/behavioral_state.ipynb
          rm ./docs/higher-order/*.nwb

      - name: Testing Basics Notebooks
        run: |
          uv run pytest --nbmake --nbmake-timeout=100000 -n=auto "./docs/basics"
          rm ./docs/basics/*.nwb

      - name: Testing Visualization Notebooks
        run: |
          uv run pytest --nbmake --nbmake-timeout=8000 -n=auto "./docs/visualization"
          rm ./docs/visualization/*.nwb

      - name: Testing First-Order Notebooks
        run: |
          uv run pytest --nbmake --nbmake-timeout=8000 -n=auto "./docs/first-order"
          rm ./docs/first-order/*.nwb
        
      - name: Testing Project Notebooks
        run: |
          uv run pytest --nbmake --nbmake-timeout=8000 -n=auto "./docs/projects"
          rm ./docs/projects/*.nwb
        
      - name: Printing log
        run: |
          git config --global --add safe.directory /__w/openscope_databook/openscope_databook
          git status
      
      - name: Printing shortlog
        run: git log | git shortlog -sn  

      - name: Build Jupyter book
        run: |
          uv run jupyter-book clean ./docs
          uv run jupyter-book build ./docs
